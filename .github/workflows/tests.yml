# This workflow runs pipx's unit, integration, and doctest checks.
name: tests

# Run tests for pushes to main, pull requests targeting main,
# and manual workflow dispatches.
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

# Grant read-only repository access because tests do not write repository content.
permissions:
  contents: read

# Cancel older test runs for the same branch to keep feedback current.
concurrency:
  group: pipx-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run the full test suite on Ubuntu to keep feedback fast and focused.
  test:
    name: pipx
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository so Cargo can run tests.
      - name: Checkout
        uses: actions/checkout@v4

      # Install stable Rust for the Ubuntu test run.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache downloaded crates and git dependencies.
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-tests-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tests-registry-

      # Cache build artifacts for faster repeated test runs.
      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-tests-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-tests-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-tests-target-

      # Run tests with default features.
      - name: Test
        run: cargo test --workspace

      # Run tests with all feature-gated APIs enabled.
      - name: Test all features
        run: cargo test --workspace --all-features