# This workflow generates and uploads code coverage reports.
name: coverage

# Run coverage checks for pushes to main, pull requests targeting main,
# and manual workflow dispatches.
on:
  push:
    branches:
      - main

  workflow_dispatch:

# Grant read-only repository access because coverage generation does not
# modify repository content.
permissions:
  contents: read

# Cancel older coverage runs for the same branch to keep feedback current.
concurrency:
  group: pipx-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Generate coverage reports on Ubuntu because cargo-tarpaulin is Linux-focused.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository so coverage tools can inspect all crates.
      - name: Checkout
        uses: actions/checkout@v4

      # Install stable Rust for coverage generation.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache downloaded crates and git dependencies.
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-coverage-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-coverage-registry-

      # Cache build artifacts for faster repeated coverage runs.
      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: ubuntu-coverage-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ubuntu-coverage-target-${{ hashFiles('**/Cargo.lock') }}-
            ubuntu-coverage-target-

      # Install cargo-tarpaulin for coverage reporting.
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      # Generate a Cobertura-compatible coverage report.
      - name: Generate coverage
        run: cargo tarpaulin --workspace --all-features --out Xml

      # Upload coverage results to Codecov.
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}